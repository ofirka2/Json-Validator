<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Toolbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1 class="app-title">JSON Toolbox</h1>
            <h2 class="app-subtitle">Convert, Validate, and Format JSON with Ease</h2>
        </header>
        
        <main class="card">
            <!-- Tab Navigation -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="format">
                    <i class="fas fa-magic"></i> Format &amp; Fix
                </button>
                <button class="tab-btn" data-tab="schema">
                    <i class="fas fa-check-double"></i> Schema Validate
                </button>
            </div>

            <!-- Format & Fix Tab -->
            <div class="tab-pane" id="tab-format">
                <div id="unified-form">
                    <div class="input-group">
                        <label class="input-label" for="input-area">
                            <i class="fas fa-code"></i> Enter JSON or Phrase
                        </label>
                        <textarea class="textarea" id="input-area" placeholder="Enter valid JSON or key-value pairs like:&#10;name: John, age: 30, hobbies: [reading, gaming, hiking]&#10;&#10;Or paste JSON like:&#10;{&#10;  &quot;name&quot;: &quot;John&quot;,&#10;  &quot;age&quot;: 30,&#10;  &quot;hobbies&quot;: [&quot;reading&quot;, &quot;gaming&quot;, &quot;hiking&quot;]&#10;}"></textarea>
                    </div>
                    <div class="button-group">
                        <button class="button" id="process-button">
                            <i class="fas fa-magic"></i> Process
                        </button>
                        <button class="button" id="excel-button">
                            <i class="fas fa-file-excel"></i> Convert to Excel
                        </button>
                        <button class="button clear-button" id="clear-button">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                </div>

                <div class="message error" id="error-message"></div>
                <div class="message success" id="success-message"></div>

                <div class="result-container" id="result-container">
                    <div class="result-header">
                        <h3 class="result-title">
                            <i class="fas fa-file-code"></i> Formatted Result
                        </h3>
                        <div class="result-header-actions">
                            <button class="button view-toggle-btn" id="view-toggle-button">
                                <i class="fas fa-table"></i> Friendly View
                            </button>
                            <button class="button copy-button" id="copy-button">
                                <i class="fas fa-copy"></i> Copy to Clipboard
                            </button>
                        </div>
                    </div>
                    <div class="result-content" id="result-content"></div>
                </div>
            </div>

            <!-- Schema Validate Tab -->
            <div class="tab-pane" id="tab-schema" style="display:none">
                <div class="schema-panels">
                    <div class="input-group">
                        <label class="input-label" for="schema-json-area">
                            <i class="fas fa-code"></i> JSON Data
                        </label>
                        <textarea class="textarea" id="schema-json-area" placeholder='Paste the JSON you want to validate here...&#10;&#10;Example:&#10;{&#10;  "name": "John",&#10;  "age": 30,&#10;  "email": "john@example.com"&#10;}'></textarea>
                    </div>
                    <div class="input-group">
                        <label class="input-label schema-label-row" for="schema-area">
                            <span><i class="fas fa-sitemap"></i> JSON Schema</span>
                            <button class="load-example-btn" id="load-schema-example">Load Example</button>
                        </label>
                        <textarea class="textarea" id="schema-area" placeholder='Paste a JSON Schema here...&#10;&#10;Example:&#10;{&#10;  "type": "object",&#10;  "required": ["name", "age"],&#10;  "properties": {&#10;    "name": { "type": "string" },&#10;    "age": { "type": "integer", "minimum": 0 }&#10;  }&#10;}'></textarea>
                    </div>
                </div>
                <div class="button-group">
                    <button class="button" id="schema-validate-btn">
                        <i class="fas fa-check-double"></i> Validate
                    </button>
                    <button class="button clear-button" id="schema-clear-btn">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                </div>
                <div id="schema-result-area" style="display:none"></div>
            </div>
        </main>
        
        <footer class="footer">
            <p>Ofirka JSON Toolbox &copy; 2026 | A simple tool for JSON conversion and validation</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
